<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Live Weather Radar</title>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <header>
        <h1>🌩️ LIVE WEATHER RADAR</h1>
        <div class="status">
            <span class="dot"></span> RADAR ONLINE
        </div>
    </header>


    <main>

        <section class="map-container">
            <div id="map"></div>

            <div class="radar-controls">
                <button id="playRadar">▶ Radar</button>
                <button id="locate">📍 Posizione</button>
            </div>
        </section>


        <aside>

            <div class="card">
                <h2>📍 Meteo locale</h2>

                <p id="location">
                    Ricerca posizione...
                </p>

                <h3 id="temperature">
                    -- °C
                </h3>

                <p id="condition">
                    --
                </p>

                <p>
                    💨 Vento:
                    <span id="wind">--</span>
                </p>

                <p>
                    🌡 Pressione:
                    <span id="pressure">--</span>
                </p>

            </div>


            <div class="card forecast">

                <h2>Previsione radar</h2>

                <div class="forecast-row">
                    <span>14:00</span>
                    🌧️
                </div>

                <div class="forecast-row">
                    <span>15:00</span>
                    ⛈️
                </div>

                <div class="forecast-row">
                    <span>16:00</span>
                    ☁️
                </div>

            </div>

        </aside>

    </main>

</div>


<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- App JS -->
<script src="script.js"></script>

</body>
</html>
